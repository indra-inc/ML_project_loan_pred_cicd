name: CI - Loan Prediction API

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    env:
      APP_ENV: dev
      APP_NAME: loan_approval_prediction_api
      APP_VERSION: 1.0.0

      MLFLOW_TRACKING_URI: http://127.0.0.1:5000
      REGISTERED_MODEL_NAME_RF: Prediction_Model_RF
      MODEL_VERSION_RF: "1"
      MODEL_ALIAS_RF: "baseline"

      TARGET_POSITIVE_LABEL: Rejected
      TARGET_NEGATIVE_LABEL: Approved

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install project package
        run: |
          pip install -e .

      - name: Check package imports
        run: |
          python -c "import loan_pred"
          python -c "from loan_pred.processing.preprocessing_pipeline import prepare_prediction_data"
          python -c "from loan_pred.training.train import train_model_pipeline"

      - name: Check FastAPI app imports
        run: |
          python -c "from app.config import app_config; print(config)"
          python -c "from app.main import app; print(app.title)"

      - name: Build Docker image
        run: |
          docker build -t loan-pred-api:ci .