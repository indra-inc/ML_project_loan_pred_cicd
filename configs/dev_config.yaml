project:
  name: loan_approval_prediction
  environment: dev

data:
  source_type: csv
  train_path: data/loan_approval_dataset.csv
  target_column: loan_status

training:
  test_size: 0.2
  random_state: 42

models:
  random_forest:
    n_estimators: 100
    max_depth: 8
    random_state: 42

  xgboost:
    n_estimators: 100
    max_depth: 5
    learning_rate: 0.1
    random_state: 42
    eval_metric: logloss

artifacts:
  model_dir: artifacts/models
  report_dir: artifacts/reports